name: Release

# Automated release on every push to main. Two modes, auto-selected by which
# secrets are present:
#
#  • RELEASE_TOKEN present  → full semantic-release: version + CHANGELOG + git
#    tag + GitHub Release + provenance-signed npm publish, all derived from
#    Conventional Commits. (Matches datasynx-crm.)
#  • RELEASE_TOKEN absent   → idempotent npm publish of the package.json version
#    (provenance-signed), publishing only when that version isn't already on npm.
#
# Why two modes: every commit in this repo carries .github/workflows files, and
# the Actions GITHUB_TOKEN may not push a git ref that touches workflow files
# (it lacks the `workflow` scope, which Actions tokens cannot hold). semantic-
# release pushes a tag, so it needs RELEASE_TOKEN — a PAT (classic: repo +
# workflow) or a deploy key. Until that exists, the idempotent publish keeps
# releases flowing with only NPM_TOKEN. Bump the package.json version + merge.
#
# Required secret: NPM_TOKEN. Optional: RELEASE_TOKEN (unlocks full
# semantic-release), CODECOV_TOKEN (coverage, in ci.yml).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  # Never cancel an in-flight publish — a fresh push must wait, not abort it.
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write        # push the release commit + tag, create the GitHub Release
  issues: write          # semantic-release comments on released issues/PRs
  pull-requests: write
  id-token: write        # npm provenance (Sigstore OIDC)

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    env:
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
      HAS_RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN != '' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Build Claude Desktop bundle (.mcpb)
        run: npm run build:mcpb

      - name: Generate SBOM (CycloneDX)
        run: npm sbom --sbom-format cyclonedx --omit dev > sbom-cyclonedx.json || true

      - name: Upload SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom
          path: sbom-cyclonedx.json
          if-no-files-found: ignore

      - name: Upload .mcpb build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mcpb
          path: dist/cartography.mcpb
          if-no-files-found: warn

      # ── Mode A: full semantic-release (RELEASE_TOKEN present) ──────────────
      - name: Bootstrap baseline tag (one-time adoption)
        # First run only: anchor history at v1.1.1 (last manual npm release) on
        # the commit before semantic-release adoption, so the breaking-change
        # commit resolves the first automated release to 2.0.0. Skips once tags
        # exist. Uses the workflow-scoped RELEASE_TOKEN persisted by checkout.
        if: env.HAS_NPM_TOKEN == 'true' && env.HAS_RELEASE_TOKEN == 'true'
        run: |
          if [ -z "$(git tag -l 'v*.*.*')" ]; then
            echo "::notice::No version tags — anchoring v1.1.1 at df16cbf"
            git tag v1.1.1 df16cbf2a117ee04657cf2813f9575a4cd5cac40
            git push origin v1.1.1
          fi

      - name: Semantic Release
        if: env.HAS_NPM_TOKEN == 'true' && env.HAS_RELEASE_TOKEN == 'true'
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── Mode B: idempotent npm publish (no RELEASE_TOKEN) ──────────────────
      - name: Idempotent npm publish
        if: env.HAS_NPM_TOKEN == 'true' && env.HAS_RELEASE_TOKEN != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "::notice::$NAME@$VERSION already on npm — nothing to publish."
            exit 0
          fi
          echo "::notice::Publishing $NAME@$VERSION (provenance-signed)."
          npm publish
          # Best-effort GitHub Release. Creating the tag may be refused for the
          # Actions token (workflow-file scope); the npm publish above already
          # succeeded, so never fail the job on this.
          gh release create "v$VERSION" --title "v$VERSION" --generate-notes \
            dist/cartography.mcpb sbom-cyclonedx.json \
            || echo "::warning::npm publish succeeded; GitHub Release/tag skipped (needs a workflow-scoped RELEASE_TOKEN)."

      - name: No NPM_TOKEN
        if: env.HAS_NPM_TOKEN != 'true'
        run: echo "::warning::NPM_TOKEN secret not set — skipping publish. Add it under Settings → Secrets and variables → Actions."
