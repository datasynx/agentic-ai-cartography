name: Docs

# Build the Diátaxis documentation site (VitePress + TypeDoc) and deploy it to
# GitHub Pages from main. PRs build only, as a gate.
on:
  push:
    branches: [main]
    paths: ['docs/**', 'src/**', 'typedoc.json', '.github/workflows/docs.yml']
  pull_request:
    paths: ['docs/**', 'src/**', 'typedoc.json']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run docs:build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    # Only deploy from main, not on PRs.
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
