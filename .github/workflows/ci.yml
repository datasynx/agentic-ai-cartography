name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded PR/branch runs, but never cancel a main run mid-flight.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  # ── Stage 1: Quality Gates ────────────────────────────────────────────────
  quality:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Typecheck
        run: npm run lint

  # ── Stage 2: Tests (Node Matrix) ──────────────────────────────────────────
  test:
    name: Test (Node ${{ matrix.node }})
    needs: quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - run: npm ci
      - run: npm run test:coverage
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        if: matrix.node == '20'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ── Stage 3: Security & Licenses ──────────────────────────────────────────
  security:
    name: Audit & Licenses
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Dependency Audit (production tree — what consumers install)
        run: npm audit --omit=dev --audit-level=high
      - name: Dependency Audit (full tree — advisory only, non-blocking)
        # Residual highs are expected to come ONLY from npm's own bundled tree
        # (node_modules/npm/node_modules/*, e.g. picomatch) — unfixable from this
        # repo and gone on the next runner npm bump. The dev-chain `tmp` highs are
        # pinned out via package.json `overrides` (see issue #50). A NEW high in
        # our own dependency tree should be investigated, not absorbed here.
        run: npm audit --audit-level=high || true
      - name: License Check
        # Block genuinely problematic copyleft/source-available licenses.
        # --failOn handles compound SPDX expressions like "(MIT OR CC0-1.0)".
        run: >
          npx license-checker --production
          --failOn "GPL-2.0-only;GPL-2.0-or-later;GPL-3.0-only;GPL-3.0-or-later;AGPL-3.0-only;AGPL-3.0-or-later;SSPL-1.0;BUSL-1.1;Commons-Clause"

  # ── Stage 4: Build & Validate Package ─────────────────────────────────────
  build-validate:
    name: Build & Validate Package
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Verify dist output exists
        run: |
          test -f dist/index.js  || (echo "dist/index.js missing"  && exit 1)
          test -f dist/index.cjs || (echo "dist/index.cjs missing" && exit 1)
          test -f dist/cli.js    || (echo "dist/cli.js missing"    && exit 1)
          test -f dist/index.d.ts || (echo "dist/index.d.ts missing" && exit 1)
      - name: Validate Exports (publint)
        run: npx publint
      - name: Validate Type Declarations (attw)
        run: npx attw --pack . --ignore-rules no-resolution
      - name: Consumer ESM Test
        run: node test/e2e/consumer-esm.mjs
      - name: Consumer CJS Test
        run: node test/e2e/consumer-cjs.cjs
      - name: Dry-run pack
        run: npm pack --dry-run
      - name: Build Claude Desktop bundle (.mcpb)
        # Catches breakage in the mcpb manifest/bundler on every PR. The asset is
        # attached to releases by release.yml, not shipped in the npm tarball.
        run: npm run build:mcpb
      - name: Validate server.json (parity + structure + schema)
        run: node scripts/validate-server-json.mjs
      - name: Generate SBOM (CycloneDX)
        run: npm sbom --sbom-format cyclonedx --omit dev > sbom-cyclonedx.json || true
      - name: Upload Build Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/
          retention-days: 7
